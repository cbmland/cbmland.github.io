<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Indicator</title>
    
    <script src="//unpkg.com/vue@next"></script>
    <script src="//unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                clifford: '#da373d',
              }
            }
          }
        }
      </script>
</head>
<style type="text/tailwindcss">
    @layer utilities {
        .cardview{
    
            display: inline-block;
            width: 150px;
            height: 100px;
        }
    }
</style>

<body>
<div id="app">
        <div v-on:click="titleClick()" class="text-3xl font-bold p-4 text-clifford">{{period}} Indicator</div>
        <div class="p-4">
            <div class="cardview text-md" v-bind:id="'group_'+index" v-for="(item,index) in items">

                <div class="font-bold">{{item.symbol}}</div>
                <div v-if="item.bDoji">底部Doji <div class="text-sm text-gray-400">{{item.barTime}}</div></div>
                <div v-if="item.bGap">底部缺口 <div class="text-sm text-gray-400">{{item.barTime}}</div></div>
                <div v-if="item.roundB">圆弧底形态 <div class="text-sm text-gray-400">{{item.barTime}}</div></div>
                <div v-if="item.bLine">底部线出现？<div class="text-sm text-gray-400">{{item.barTime}}</div></div>
            
            </div>
        </div>

        <div class="text-gray-500 pl-4 pb-4">updated date: {{updated}}</div>

</div>

</body>
<script>

        const ComponentsApp = {
            data() {
                return {
                    items: [],
                    period: '',
                    updated:'',
                    sourceIndex:0,
                    sourceUrls:['//cbmland.com/json/Indicator_day_Data.json','//cbmland.com/json/Indicator_60min_Data.json']
                }
            },
            methods: {
                titleClick(){
                    this.sourceIndex+=1
                    if(this.sourceIndex>=this.sourceUrls.length){this.sourceIndex=0}
                    let json_url = this.sourceUrls[this.sourceIndex]
                    
                    this.loadData(json_url)
                },
                loadData(json_url){
                    let that = this
                    // Make a request for a user with a given ID
                    axios.get(json_url)
                    //axios.get('/backtrader-master/logs/Toolbox_Screener_Data.json')
                    .then(function (response) {
                        // handle success
                        //console.log(response);

                        let items = response.data.items;

                        for( var i in items){
                            var item = items[i];

                        }
                        //console.log(items)
                        //onData(response.data)
                        that.items = items
                        that.period = response.data.period
                        that.updated = response.data.updated

                    })
                    .catch(function (error) {
                        // handle error
                        console.log(error);
                    })
                    .then(function () {
                        // always executed
                    });
                }
            },
            mounted() {             
                console.log('mounted!') 
                var json_url = this.sourceUrls[this.sourceIndex]
                let result = this.loadData(json_url)
            },

        }

        const app = Vue.createApp(ComponentsApp)

        app.mount('#app')


</script>
</html>
